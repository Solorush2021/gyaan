  <path d="M84 110 Q88 96 104 88 Q98 102 96 112 Z" fill="#E8B23E" opacity="0.55"/>
  <path d="M196 110 Q192 96 176 88 Q182 102 184 112 Z" fill="#E8B23E" opacity="0.55"/>
  <path d="M140 70 Q148 88 142 112 Q136 92 140 70 Z" fill="#E8B23E" opacity="0.4"/>
