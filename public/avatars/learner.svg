  <path d="M92 132 Q104 126 122 132" stroke="#A8782E" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M158 132 Q176 126 188 132" stroke="#A8782E" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Eyes (wide bright, hopeful) -->
  <ellipse cx="108" cy="156" rx="16" ry="20" fill="#FFFFFF"/>
  <ellipse cx="108" cy="157" rx="13" ry="17" fill="#3A7BD5"/>
  <ellipse cx="108" cy="159" rx="9" ry="13" fill="#5FA0E8"/>
  <circle cx="103" cy="151" r="4" fill="#FFFFFF"/>
  <circle cx="113" cy="164" r="2.5" fill="#FFFFFF" opacity="0.85"/>
  <path d="M92 152 Q108 142 124 152" stroke="#2C3E66" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <ellipse cx="172" cy="156" rx="16" ry="20" fill="#FFFFFF"/>
  <ellipse cx="172" cy="157" rx="13" ry="17" fill="#3A7BD5"/>
  <ellipse cx="172" cy="159" rx="9" ry="13" fill="#5FA0E8"/>
  <circle cx="167" cy="151" r="4" fill="#FFFFFF"/>
  <circle cx="177" cy="164" r="2.5" fill="#FFFFFF" opacity="0.85"/>
  <path d="M156 152 Q172 142 188 152" stroke="#2C3E66" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M138 174 Q140 180 142 174" stroke="#E0A888" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Mouth (cheerful open smile) -->
  <path d="M124 190 Q140 206 156 190 Q140 198 124 190 Z" fill="#C0506A"/>
  <path d="M126 191 Q140 200 154 191" stroke="#9E3A52" stroke-width="1.5" fill="none"/>
  <path d="M130 191 Q140 196 150 191 L150 189 Q140 192 130 189 Z" fill="#FFFFFF" opacity="0.8"/>
</svg>