  <path d="M55 130 Q48 165 60 195 Q66 175 64 155 Q62 138 70 115 Z" fill="#B898E0"/>
  <path d="M225 130 Q232 165 220 195 Q214 175 216 155 Q218 138 210 115 Z" fill="#B898E0"/>
