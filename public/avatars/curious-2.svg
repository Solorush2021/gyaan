  <path d="M52 130 Q52 60 140 48 Q228 60 228 130 L225 188 Q210 172 206 156 L206 105 Q185 88 140 88 Q95 88 74 105 L74 156 Q70 172 55 188 Z" fill="#B898E0"/>
