  <path d="M62 110 Q60 58 108 50 Q140 44 172 50 Q220 58 218 110 Q210 88 188 88 Q195 102 175 108 Q165 95 148 100 Q158 85 142 80 Q128 88 118 100 Q100 92 95 88 Q72 88 62 110 Z" fill="#C8A8E8"/>
  <!-- hair shadow -->
  <path d="M62 110 Q60 58 108 50 Q140 44 172 50 Q220 58 218 110 Q205 70 168 64 Q140 60 112 64 Q75 70 62 110 Z" fill="#9070C0"/>
  <!-- hair shine strands -->
  <path d="M105 70 Q120 62 135 68" stroke="#D8B8F0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- headband -->
  <path d="M72 78 Q140 64 208 78" stroke="#E8C0D0" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- eyebrows - both curious -->
  <path d="M96 114 Q108 108 122 114" stroke="#7858A0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M158 114 Q172 108 184 114" stroke="#7858A0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- eyes whites - wide -->
  <ellipse cx="112" cy="144" rx="14" ry="16" fill="#FFFFFF"/>
  <ellipse cx="168" cy="144" rx="14" ry="16" fill="#FFFFFF"/>
  <!-- iris teal -->
  <ellipse cx="112" cy="145" rx="10" ry="13" fill="#48C0B0"/>
  <ellipse cx="168" cy="145" rx="10" ry="13" fill="#48C0B0"/>
  <ellipse cx="112" cy="147" rx="6" ry="9" fill="#208878"/>
  <ellipse cx="168" cy="147" rx="6" ry="9" fill="#208878"/>
  <!-- highlight -->
  <circle cx="116" cy="140" r="4.5" fill="#FFFFFF"/>
  <circle cx="172" cy="140" r="4.5" fill="#FFFFFF"/>
  <circle cx="108" cy="150" r="2" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="164" cy="150" r="2" fill="#FFFFFF" opacity="0.8"/>
  <!-- upper lash -->
  <path d="M98 130 Q112 124 126 131" stroke="#2A1A0E" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M154 131 Q168 124 182 130" stroke="#2A1A0E" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- nose -->
  <path d="M138 159 Q140 166 144 163" stroke="#E0B098" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- mouth - small curious smile -->
  <path d="M132 180 Q140 186 148 180" stroke="#B85858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="140" cy="183" rx="3" ry="2" fill="#D88888" opacity="0.6"/>
  <!-- cheek blush -->
  <ellipse cx="90" cy="174" rx="11" ry="6" fill="#FFB8C0" opacity="0.5"/>
  <ellipse cx="190" cy="174" rx="11" ry="6" fill="#FFB8C0" opacity="0.5"/>
