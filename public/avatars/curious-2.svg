<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280">
  <circle cx="140" cy="140" r="140" fill="#F0E8FF"/>
  <!-- shoulders -->
  <path d="M50 280 C50 220 90 200 140 200 C190 200 230 220 230 280 Z" fill="#A878C8"/>
  <path d="M50 280 C50 220 90 200 140 200 C190 200 230 220 230 280 Z" fill="#8858A8" opacity="0.5"/>
  <!-- neck -->
  <path d="M118 182 L120 206 Q140 219 162 205 L162 182 Z" fill="#FFE0C8"/>
  <path d="M118 196 Q140 210 162 195 L162 205 Q140 219 118 205 Z" fill="#F0C8A8"/>
