  <circle cx="138.5" cy="156.5" r="1.3" fill="#FFB3C4"/>

  <!-- Mouth: big mischievous grin -->
  <path d="M118 172 Q140 196 162 172 Q140 180 118 172 Z" fill="#B33A55"/>
  <path d="M118 172 Q140 196 162 172" stroke="#8A2440" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- tongue -->
  <path d="M132 182 Q140 190 148 182 Q140 186 132 182 Z" fill="#FF7A95"/>
  <!-- sparkle in eye -->
  <path d="M200 96 L204 102 L210 104 L204 106 L200 112 L196 106 L190 104 L196 102 Z" fill="#FFE94A" opacity="0.9"/>
