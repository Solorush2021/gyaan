  <path d="M156 106 Q172 100 188 108" stroke="#C25C82" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <!-- Left -->
  <ellipse cx="108" cy="138" rx="15" ry="18" fill="#FFFFFF"/>
  <ellipse cx="108" cy="140" rx="11" ry="14" fill="#4FB8C9"/>
  <ellipse cx="108" cy="142" rx="9" ry="11" fill="#2E97A8"/>
  <circle cx="112" cy="134" r="4" fill="#FFFFFF"/>
  <circle cx="104" cy="146" r="2.2" fill="#FFFFFF" opacity="0.8"/>
  <path d="M92 134 Q108 124 124 134" stroke="#3A2A40" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Right -->
  <ellipse cx="172" cy="138" rx="15" ry="18" fill="#FFFFFF"/>
  <ellipse cx="172" cy="140" rx="11" ry="14" fill="#4FB8C9"/>
  <ellipse cx="172" cy="142" rx="9" ry="11" fill="#2E97A8"/>
  <circle cx="176" cy="134" r="4" fill="#FFFFFF"/>
  <circle cx="168" cy="146" r="2.2" fill="#FFFFFF" opacity="0.8"/>
  <path d="M156 134 Q172 124 188 134" stroke="#3A2A40" stroke-width="3" fill="none" stroke-linecap="round"/>

