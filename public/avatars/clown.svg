  <path d="M48 280 Q48 220 90 200 L190 200 Q232 220 232 280 Z" fill="#5BBFCB" opacity="0.35"/>
  <!-- Ruffle collar -->
  <path d="M70 205 Q90 188 110 205 Q130 188 150 205 Q170 188 190 205 Q210 188 215 205 L215 220 Q180 232 140 232 Q100 232 70 220 Z" fill="#FFFFFF"/>
  <path d="M70 205 Q90 188 110 205 Q130 188 150 205 Q170 188 190 205 Q210 188 215 205 L215 220 Q180 232 140 232 Q100 232 70 220 Z" fill="#F0C8D8" opacity="0.4"/>
