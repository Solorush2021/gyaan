  <path d="M48 130 Q44 158 56 178 Q60 158 64 138 Z" fill="#FF9EC7"/>
  <path d="M232 130 Q236 158 224 178 Q220 158 216 138 Z" fill="#FF9EC7"/>
  <!-- turquoise streak -->
  <path d="M120 66 Q128 56 140 70 Q132 80 124 76 Z" fill="#5FE0D8"/>

