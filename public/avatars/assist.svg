  <path d="M158 115 Q172 110 184 116" stroke="#A86820" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- eyes whites -->
  <ellipse cx="112" cy="142" rx="13" ry="15" fill="#FFFFFF"/>
  <ellipse cx="168" cy="142" rx="13" ry="15" fill="#FFFFFF"/>
  <!-- iris amber -->
  <ellipse cx="112" cy="144" rx="10" ry="13" fill="#D08838"/>
  <ellipse cx="168" cy="144" rx="10" ry="13" fill="#D08838"/>
  <ellipse cx="112" cy="146" rx="6" ry="9" fill="#9A5818"/>
  <ellipse cx="168" cy="146" rx="6" ry="9" fill="#9A5818"/>
  <!-- highlight -->
  <circle cx="116" cy="139" r="4" fill="#FFFFFF"/>
  <circle cx="172" cy="139" r="4" fill="#FFFFFF"/>
  <circle cx="108" cy="149" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="164" cy="149" r="2" fill="#FFFFFF" opacity="0.7"/>
