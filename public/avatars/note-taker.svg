  <path d="M98 110 Q112 104 128 110" stroke="#6B3A20" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M152 110 Q168 104 182 110" stroke="#6B3A20" stroke-width="3.5" fill="none" stroke-linecap="round"/>
