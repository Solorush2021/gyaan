  <path d="M152 110 Q166 105 180 110" stroke="#3A2418" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes: warm amber, attentive -->
  <g>
    <path d="M96 136 Q113 124 130 136 Q113 152 96 136 Z" fill="#FFFFFF"/>
    <ellipse cx="113" cy="136" rx="10" ry="11" fill="#A06A2E"/>
    <ellipse cx="113" cy="136" rx="10" ry="11" fill="#7A4E1E" opacity="0.5"/>
    <circle cx="113" cy="139" r="5" fill="#3A2410"/>
    <circle cx="110" cy="133" r="2.5" fill="#FFFFFF"/>
    <circle cx="116" cy="142" r="1.4" fill="#FFFFFF"/>
    <path d="M96 136 Q113 124 130 136" stroke="#3A3A3A" stroke-width="2" fill="none"/>
  </g>
  <g>
    <path d="M150 136 Q167 124 184 136 Q167 152 150 136 Z" fill="#FFFFFF"/>
