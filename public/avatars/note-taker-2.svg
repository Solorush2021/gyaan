  <ellipse cx="96" cy="158" rx="9" ry="5" fill="#F5A8A0" opacity="0.5"/>
  <ellipse cx="184" cy="158" rx="9" ry="5" fill="#F5A8A0" opacity="0.5"/>
  <!-- Nose -->
  <path d="M139 150 Q137 158 141 161" stroke="#E0AE92" stroke-width="2" fill="none" stroke-linecap="round"/>
