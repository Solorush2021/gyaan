    <ellipse cx="167" cy="136" rx="10" ry="11" fill="#7A4E1E" opacity="0.5"/>
    <circle cx="167" cy="139" r="5" fill="#3A2410"/>
    <circle cx="164" cy="133" r="2.5" fill="#FFFFFF"/>
    <circle cx="170" cy="142" r="1.4" fill="#FFFFFF"/>
    <path d="M150 136 Q167 124 184 136" stroke="#3A3A3A" stroke-width="2" fill="none"/>
  </g>
