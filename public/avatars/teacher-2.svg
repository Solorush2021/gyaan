<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280">
  <circle cx="140" cy="140" r="140" fill="#E8F3FF"/>
  <!-- shoulders/clothing -->
  <path d="M50 280 C50 220 90 200 140 200 C190 200 230 220 230 280 Z" fill="#8A5A78"/>
  <path d="M50 280 C50 220 90 200 140 200 C190 200 230 220 230 280 Z" fill="#6A4058" opacity="0.5"/>
  <!-- neat collar V -->
  <path d="M108 205 L140 245 L172 205 L165 210 L140 235 L115 210 Z" fill="#F5E8E8"/>
  <!-- neck -->
  <path d="M120 180 L120 205 Q140 218 160 205 L160 180 Z" fill="#FFE0C8"/>
  <path d="M120 195 Q140 210 160 195 L160 205 Q140 218 120 205 Z" fill="#F0C8A8"/>
