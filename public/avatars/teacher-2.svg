  <path d="M52 135 Q52 68 140 52 Q228 68 228 135 L225 185 Q210 170 205 155 L205 110 Q180 92 140 92 Q100 92 75 110 L75 155 Q70 170 55 185 Z" fill="#1A1A22"/>
  <!-- face -->
  <ellipse cx="140" cy="135" rx="78" ry="86" fill="#FFE0C8"/>
  <!-- face shadow -->
  <path d="M140 60 Q210 65 215 130 Q215 175 195 205 Q210 170 205 140 Q200 90 140 85 Z" fill="#F0C8A8" opacity="0.55"/>
  <!-- ears -->
  <ellipse cx="63" cy="142" rx="8" ry="14" fill="#FFE0C8"/>
  <ellipse cx="217" cy="142" rx="8" ry="14" fill="#F0C8A8"/>
  <!-- earring -->
  <circle cx="63" cy="156" r="3" fill="#E8C870"/>
  <circle cx="217" cy="156" r="3" fill="#E8C870"/>
  <!-- hair front - parted, neat -->
  <path d="M62 118 Q60 70 105 58 Q140 48 175 58 Q220 70 218 118 Q215 92 188 88 L180 105 Q165 92 140 95 Q115 92 100 105 L92 88 Q65 92 62 118 Z" fill="#26262E"/>
  <!-- side hair locks -->
  <path d="M62 118 Q58 160 75 175 L80 170 Q72 145 75 110 Z" fill="#1A1A22"/>
  <path d="M218 118 Q222 160 205 175 L200 170 Q208 145 205 110 Z" fill="#1A1A22"/>
  <!-- hair shine -->
  <path d="M110 75 Q140 65 170 75" stroke="#3A3A48" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- eyebrows -->
  <path d="M95 120 Q108 115 122 119" stroke="#1A1A22" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M158 119 Q172 115 185 120" stroke="#1A1A22" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- eyes whites -->
  <ellipse cx="112" cy="142" rx="13" ry="14" fill="#FFFFFF"/>
  <ellipse cx="168" cy="142" rx="13" ry="14" fill="#FFFFFF"/>
  <!-- iris -->
  <ellipse cx="112" cy="144" rx="9" ry="12" fill="#5A8A6A"/>
  <ellipse cx="168" cy="144" rx="9" ry="12" fill="#5A8A6A"/>
  <ellipse cx="112" cy="146" rx="5" ry="8" fill="#38604A"/>
  <ellipse cx="168" cy="146" rx="5" ry="8" fill="#38604A"/>
  <!-- highlight -->
  <circle cx="115" cy="140" r="3.5" fill="#FFFFFF"/>
  <circle cx="171" cy="140" r="3.5" fill="#FFFFFF"/>
  <circle cx="109" cy="148" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="165" cy="148" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  <!-- upper lash -->
  <path d="M99 132 Q112 128 125 134" stroke="#15151A" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M155 134 Q168 128 181 132" stroke="#15151A" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- nose -->
  <path d="M138 158 Q140 165 143 163" stroke="#E0B098" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- mouth - warm smile -->
  <path d="M126 178 Q140 188 154 178" stroke="#B86848" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M130 181 Q140 184 150 181" fill="#D88878" opacity="0.5"/>
  <!-- cheek blush -->
  <ellipse cx="90" cy="172" rx="10" ry="5.5" fill="#FFB8B0" opacity="0.4"/>
  <ellipse cx="190" cy="172" rx="10" ry="5.5" fill="#FFB8B0" opacity="0.4"/>
</svg>
