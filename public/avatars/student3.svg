  <path d="M230 135 Q238 175 230 200 Q222 215 210 208 Q220 190 218 165 Q218 145 210 130 Z" fill="#C8B0E0"/>
  <!-- Wave shadow tones -->
  <path d="M52 160 Q50 190 60 205 Q56 185 58 160 Z" fill="#A88FC4" opacity="0.6"/>
  <path d="M228 160 Q230 190 220 205 Q224 185 222 160 Z" fill="#A88FC4" opacity="0.6"/>
