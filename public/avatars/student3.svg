  <path d="M62 110 Q56 64 105 52 Q140 44 178 52 Q224 64 218 112 Q206 90 184 94 L168 116 Q160 94 138 98 L128 118 Q114 94 92 100 L78 118 Q72 106 62 110 Z" fill="#D4BEEA"/>
  <!-- Wavy bang detail -->
  <path d="M120 96 Q138 90 160 96 L156 120 Q142 108 126 114 Z" fill="#B89CD0"/>
  <!-- Beret -->
  <g>
    <ellipse cx="142" cy="52" rx="48" ry="20" fill="#9B6BB0"/>
    <path d="M96 52 Q100 38 142 34 Q184 38 188 52 Q172 44 142 44 Q112 44 96 52 Z" fill="#AC7BC0"/>
    <ellipse cx="142" cy="52" rx="48" ry="20" fill="#8A5A9E" opacity="0.25"/>
    <circle cx="142" cy="36" r="6" fill="#7A4A8E"/>
    <circle cx="142" cy="36" r="6" fill="#9B6BB0" opacity="0.5"/>
    <!-- beret band -->
    <ellipse cx="142" cy="64" rx="40" ry="6" fill="#7A4A8E"/>
  </g>
  <!-- Ears -->
  <ellipse cx="65" cy="128" rx="9" ry="12" fill="#FFE0C8"/>
  <ellipse cx="215" cy="128" rx="9" ry="12" fill="#FFE0C8"/>
  <!-- Eyebrows (soft) -->
  <path d="M100 110 Q114 106 128 110" stroke="#8E6AA8" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M152 110 Q166 106 180 110" stroke="#8E6AA8" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes: dreamy violet, half-lidded -->
  <g>
    <path d="M96 138 Q113 126 130 138 Q113 152 96 138 Z" fill="#FFFFFF"/>
    <ellipse cx="113" cy="139" rx="10" ry="10" fill="#A07AC8"/>
    <ellipse cx="113" cy="139" rx="10" ry="10" fill="#7E5AA0" opacity="0.5"/>
    <circle cx="113" cy="141" r="5" fill="#4E2E70"/>
    <circle cx="110" cy="135" r="2.5" fill="#FFFFFF"/>
    <path d="M96 138 Q113 126 130 138" stroke="#3A3A3A" stroke-width="2" fill="none"/>
    <!-- half-lid -->
    <path d="M96 138 Q113 134 130 138" stroke="#D8A8A0" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>
  <g>
    <path d="M150 138 Q167 126 184 138 Q167 152 150 138 Z" fill="#FFFFFF"/>
    <ellipse cx="167" cy="139" rx="10" ry="10" fill="#A07AC8"/>
    <ellipse cx="167" cy="139" rx="10" ry="10" fill="#7E5AA0" opacity="0.5"/>
    <circle cx="167" cy="141" r="5" fill="#4E2E70"/>
    <circle cx="164" cy="135" r="2.5" fill="#FFFFFF"/>
    <path d="M150 138 Q167 126 184 138" stroke="#3A3A3A" stroke-width="2" fill="none"/>
    <path d="M150 138 Q167 134 184 138" stroke="#D8A8A0" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>
  <!-- Dreamy blush -->
  <ellipse cx="96" cy="160" rx="10" ry="5.5" fill="#F2A0C0" opacity="0.55"/>
  <ellipse cx="184" cy="160" rx="10" ry="5.5" fill="#F2A0C0" opacity="0.55"/>
  <!-- Nose -->
  <path d="M139 150 Q137 158 141 161" stroke="#E0B098" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Mouth: dreamy half-smile -->
  <path d="M134 173 Q140 179 148 172" stroke="#B05A80" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
